<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- company title and nav capsulated inside the <header> -->
    <header>
        <h1>Breakfast</h1> <!-- clickable title content back into home page -->
        <!-- navigational link at the middle of the <header> via *flex* styling -->
        <nav class="navigational-links">
            <ul>
                <li><a id="home" class="nav-link" href="index.html">Home</a></li>
                <li><a id="home" class="nav-link" href="cuisine.html">Title</a></li>
                <li><a id="home" class="nav-link" href="recipe.html">Recipe</a></li>
                <li><a id="home" class="nav-link" href="page4.html">Contact Us</a></li>
            </ul>
        </nav>
        <button type="button" id="search"></button>
    </header>
    <!-- main section -->
    <main>
        <section class="on-high-division page-overview" id="contact-intro">
            <h1>CONTACT</h1>
            <p>1234</p>
        </section>
        <!-- Form Section -->
        <section id="form">
            <h2>GET IN TOUCH WITH US</h2>

            <div class="contact-container">
                <!-- Form Container -->
                <form>
                    <section class="form-block ftg-1">
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email" required>
                    </section>
                    <section class="form-block ftg-2">
                        <label for="phone-number">Phone Number</label>
                        <input type="tel" name="phone-number" id="phone-number" required>
                    </section>
                    <section class="form-block ftg-3">
                        <label for="full-name">Full Name</label>
                        <input type="text" name="full-name" id="full-name" required>
                    </section>
                    <section class="form-block ftg-4">
                        <label for="message">Message</label>
                        <!-- <input type="g" name="message" id="message" required> -->
                        <textarea name="message" id="message"></textarea>
                    </section>
                </form>
                <!-- Contact Info Sided -->
                <div class="contact-info-side">
                    <!-- Contact Block -->
                    <div class="contact-block" id="email-profile">
                        <!-- https://www.svgrepo.com/svg/468758/email?edit=true -->
                        <svg viewBox="0 0 24 24" data-name="Flat Line" xmlns="http://www.w3.org/2000/svg" class="icon flat-line">
                            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                            <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                            <g id="SVGRepo_iconCarrier">
                                <path id="secondary" d="M20.61,5.23l-8,6.28a1,1,0,0,1-1.24,0l-8-6.28A1,1,0,0,0,3,6V18a1,1,0,0,0,1,1H20a1,1,0,0,0,1-1V6A1,1,0,0,0,20.61,5.23Z"></path>
                                <path id="primary" d="M20,19H4a1,1,0,0,1-1-1V6A1,1,0,0,1,4,5H20a1,1,0,0,1,1,1V18A1,1,0,0,1,20,19ZM20,5H4a1,1,0,0,0-.62.22l8,6.29a1,1,0,0,0,1.24,0l8-6.29A1,1,0,0,0,20,5Z"></path>
                            </g>
                        </svg>
                        <div class="contact-context">
                            <h3>Email</h3>
                            <p>name@example.com</p>
                        </div>
                    </div>
                    <div class="contact-block" id="phone-number-list">
                        <!-- https://www.svgrepo.com/svg/508149/phone-outgoing?edit=true -->
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                            <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                            <g id="SVGRepo_iconCarrier">
                                <path opacity="0.1" d="M3 6.5C3 14.5081 9.49187 21 17.5 21C18.166 21 18.8216 20.9551 19.4637 20.8682C20.3747 20.7448 21 19.9292 21 19.01V16.4415C21 15.5807 20.4491 14.8164 19.6325 14.5442L16.4841 13.4947C15.6836 13.2279 14.8252 13.699 14.6206 14.5177C14.3475 15.6102 12.987 15.987 12.1907 15.1907L8.80926 11.8093C8.01301 11.013 8.38984 9.65254 9.48229 9.37943C10.301 9.17476 10.7721 8.31644 10.5053 7.51586L9.45585 4.36754C9.18362 3.55086 8.41934 3 7.55848 3H4.99004C4.0708 3 3.25518 3.62533 3.13185 4.53627C3.0449 5.17845 3 5.83398 3 6.5Z"></path>
                                <path d="M3 6.5C3 14.5081 9.49187 21 17.5 21C18.166 21 18.8216 20.9551 19.4637 20.8682C20.3747 20.7448 21 19.9292 21 19.01V16.4415C21 15.5807 20.4491 14.8164 19.6325 14.5442L16.4841 13.4947C15.6836 13.2279 14.8252 13.699 14.6206 14.5177C14.3475 15.6102 12.987 15.987 12.1907 15.1907L8.80926 11.8093C8.01301 11.013 8.38984 9.65254 9.48229 9.37943C10.301 9.17476 10.7721 8.31644 10.5053 7.51586L9.45585 4.36754C9.18362 3.55086 8.41934 3 7.55848 3H4.99004C4.0708 3 3.25518 3.62533 3.13185 4.53627C3.0449 5.17845 3 5.83398 3 6.5Z" stroke-linejoin="round"></path>
                                <path d="M15 9L20.5 3.5" stroke-linecap="round" stroke-linejoin="round"></path>
                                <path d="M21 7L21 3.5V3.5C21 3.22386 20.7761 3 20.5 3V3L17 3" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
                            </g>
                        </svg>
                        <div class="contact-context">
                            <h3>Phone Number</h3>
                            <p>(488) 291-4560</p>
                        </div>
                    </div>
                    <div class="contact-block" id="headquarter">
                        <!-- https://www.svgrepo.com/svg/505682/location-1 -->
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                            <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                            <g id="SVGRepo_iconCarrier">
                                <path d="M9 11C9 12.6569 10.3431 14 12 14C13.6569 14 15 12.6569 15 11C15 9.34315 13.6569 8 12 8M12 21C7.58172 19 4 15.4183 4 11C4 6.58172 7.58172 3 12 3C16.4183 3 20 6.58172 20 11C20 13.9453 18.4083 16.5189 16.0382 18.5" stroke-linecap="round" stroke-linejoin="round"></path>
                            </g>
                        </svg>
                        <div class="contact-context">
                            <h3>Headquarter</h3>
                            <p>2800 Cromwell Rd Norfolk, USA</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="maps">
            <!-- embedded Google Maps -->
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3191.771554466665!2d-76.2530885891084!3d36.87188657211095!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89ba9798de6d67b7%3A0x2500db9e8a7b03f!2s2800%20Cromwell%20Rd%2C%20Norfolk%2C%20VA%2023509%2C%20USA!5e0!3m2!1sen!2snz!4v1777367357221!5m2!1sen!2snz" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>

    </main>
